<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thermal — live</title>
  <style>
    body { margin: 0; background: #000; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    img { max-width: 100%; max-height: 100vh; object-fit: contain; }
    p { position: fixed; bottom: 8px; left: 12px; color: #888; font: 12px system-ui, sans-serif; margin: 0; }
  </style>
</head>
<body>
  <img id="v" alt="Thermal" />
  <p id="st">Connecting…</p>
  <script>
    const st = document.getElementById("st");
    const img = document.getElementById("v");
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    let ws = null;
    let objectUrl = null;
    let backoff = 800;

    function connect() {
      if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
      st.textContent = "Connecting…";
      ws = new WebSocket(proto + "//" + location.host + "/ws/thermal");
      ws.binaryType = "arraybuffer";
      ws.onopen = () => { backoff = 800; st.textContent = "Live"; };
      ws.onmessage = (ev) => {
        const buf = ev.data;
        if (!(buf instanceof ArrayBuffer) || buf.byteLength === 0) return;
        if (objectUrl) URL.revokeObjectURL(objectUrl);
        objectUrl = URL.createObjectURL(new Blob([buf], { type: "image/jpeg" }));
        img.src = objectUrl;
      };
      ws.onerror = () => { try { ws.close(); } catch (_) {} };
      ws.onclose = () => {
        st.textContent = "Reconnecting…";
        ws = null;
        setTimeout(connect, backoff);
        backoff = Math.min(backoff * 1.35, 8000);
      };
    }
    connect();
  </script>
</body>
</html>
